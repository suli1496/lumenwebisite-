<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1200" height="500" fill="#f7f6f3"/>
  <text x="600" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#2a2a28">LUMEN SECURITY — Official Brand Palette</text>
  <text x="600" y="64" text-anchor="middle" font-size="12" fill="#7a7a76">Colors already in consistent use across the logo work</text>

  <!-- Primary Navy -->
  <g transform="translate(90,110)">
    <rect width="240" height="240" rx="10" fill="#0e2a47"/>
    <text x="120" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#2a2a28">Primary Navy</text>
    <text x="120" y="292" text-anchor="middle" font-size="12" fill="#4a4a48">#0E2A47</text>
    <text x="120" y="310" text-anchor="middle" font-size="10" fill="#9a9890">Tower, wordmark, hat</text>
  </g>

  <!-- Silver -->
  <g transform="translate(370,110)">
    <rect width="240" height="240" rx="10" fill="#b9bcbe" stroke="#e2e0da"/>
    <text x="120" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#2a2a28">Silver</text>
    <text x="120" y="292" text-anchor="middle" font-size="12" fill="#4a4a48">#B9BCBE</text>
    <text x="120" y="310" text-anchor="middle" font-size="10" fill="#9a9890">Lens ring, bands, beam cool tone</text>
  </g>

  <!-- Beam Gray (flat print version) -->
  <g transform="translate(650,110)">
    <rect width="240" height="240" rx="10" fill="#9ba0a3"/>
    <text x="120" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#2a2a28">Steel Gray</text>
    <text x="120" y="292" text-anchor="middle" font-size="12" fill="#4a4a48">#9BA0A3</text>
    <text x="120" y="310" text-anchor="middle" font-size="10" fill="#9a9890">Flat print beam (version A)</text>
  </g>

  <!-- Accent Red -->
  <g transform="translate(930,110)">
    <rect width="240" height="240" rx="10" fill="#c0392b"/>
    <text x="120" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#2a2a28">Accent Red</text>
    <text x="120" y="292" text-anchor="middle" font-size="12" fill="#4a4a48">#C0392B</text>
    <text x="120" y="310" text-anchor="middle" font-size="10" fill="#9a9890">Beacon dot, beam source</text>
  </g>

  <!-- Secondary/darker red for gradients -->
  <text x="90" y="360" font-size="13" font-weight="700" fill="#2a2a28">Supporting tones (used in gradients/shading, not standalone brand colors)</text>
  <rect x="90" y="375" width="40" height="40" rx="4" fill="#8b1a1a"/>
  <text x="140" y="398" font-size="12" fill="#4a4a48">#8B1A1A — deep red (beam origin, darker shading)</text>
  <rect x="90" y="425" width="40" height="40" rx="4" fill="#f7f6f3" stroke="#e2e0da"/>
  <text x="140" y="448" font-size="12" fill="#4a4a48">#F7F6F3 — off-white background</text>

</svg>
