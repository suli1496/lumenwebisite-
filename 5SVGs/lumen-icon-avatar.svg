<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="downGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#9ba0a3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c7cacc" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8b1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hatShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e2a47" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.2"/>
    </linearGradient>
    <clipPath id="circleClip"><circle cx="0" cy="0" r="180"/></clipPath>
    <clipPath id="squareClip"><rect x="-180" y="-180" width="360" height="360" rx="40"/></clipPath>
  </defs>

  <rect width="1200" height="500" fill="#f7f6f3"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2a2a28">Icon-Only — Social Avatar Versions</text>

  <!-- CIRCLE crop, on brand navy background -->
  <g transform="translate(240,260)">
    <text x="0" y="-210" text-anchor="middle" font-size="12" letter-spacing="1" fill="#9a9890">CIRCLE · NAVY BACKGROUND</text>
    <circle cx="0" cy="0" r="180" fill="#0e2a47"/>
    <g clip-path="url(#circleClip)">
      <g transform="translate(0,25) scale(1.15) translate(0,-65)">
        <path d="M-10,30 L-215,150 L215,150 L10,30 Z" fill="url(#downGlow)" opacity="0.8"/>
        <circle cx="0" cy="30" r="20" fill="url(#lensGlow)"/>
        <rect x="-23" y="98" width="46" height="52" fill="#f7f6f3"/>
        <rect x="-27" y="146" width="54" height="7" rx="1" fill="#f7f6f3"/>
        <rect x="-15" y="60" width="30" height="38" fill="#f7f6f3"/>
        <rect x="-21" y="47" width="42" height="11" rx="2" fill="#f7f6f3"/>
        <rect x="-15" y="15" width="30" height="32" rx="3" fill="#f7f6f3"/>
        <circle cx="0" cy="30" r="12" fill="none" stroke="#b9bcbe" stroke-width="4"/>
        <circle cx="0" cy="30" r="5" fill="#e8b4a0"/>
        <ellipse cx="0" cy="13" rx="28" ry="5" fill="#f7f6f3"/>
        <path d="M-28,13 Q-9,3 0,-13 Q9,3 28,13 Z" fill="#f7f6f3"/>
        <circle cx="0" cy="-13" r="8" fill="url(#tipGlow)"/>
        <circle cx="0" cy="-13" r="4.5" fill="#c0392b"/>
      </g>
    </g>
  </g>

  <!-- SQUARE crop, on white background -->
  <g transform="translate(600,260)">
    <text x="0" y="-210" text-anchor="middle" font-size="12" letter-spacing="1" fill="#9a9890">SQUARE · WHITE BACKGROUND</text>
    <rect x="-180" y="-180" width="360" height="360" rx="40" fill="#ffffff" stroke="#e2e0da" stroke-width="1.5"/>
    <g clip-path="url(#squareClip)">
      <g transform="translate(0,25) scale(1.15) translate(0,-65)">
        <path d="M-10,30 L-215,150 L215,150 L10,30 Z" fill="url(#downGlow)"/>
        <circle cx="0" cy="30" r="20" fill="url(#lensGlow)"/>
        <rect x="-23" y="98" width="46" height="52" fill="#0e2a47"/>
        <rect x="-27" y="146" width="54" height="7" rx="1" fill="#0e2a47"/>
        <rect x="-15" y="60" width="30" height="38" fill="#0e2a47"/>
        <rect x="-21" y="47" width="42" height="11" rx="2" fill="#0e2a47"/>
        <rect x="-15" y="15" width="30" height="32" rx="3" fill="#0e2a47"/>
        <circle cx="0" cy="30" r="12" fill="none" stroke="#b9bcbe" stroke-width="4"/>
        <circle cx="0" cy="30" r="5" fill="#e8b4a0"/>
        <ellipse cx="0" cy="13" rx="28" ry="5" fill="#0e2a47"/>
        <path d="M-28,13 Q-9,3 0,-13 Q9,3 28,13 Z" fill="#0e2a47"/>
        <circle cx="0" cy="-13" r="8" fill="url(#tipGlow)"/>
        <circle cx="0" cy="-13" r="4.5" fill="#c0392b"/>
      </g>
    </g>
  </g>

  <!-- CIRCLE, light background, navy icon (alt) -->
  <g transform="translate(960,260)">
    <text x="0" y="-210" text-anchor="middle" font-size="12" letter-spacing="1" fill="#9a9890">CIRCLE · LIGHT BACKGROUND</text>
    <circle cx="0" cy="0" r="180" fill="#f7f6f3" stroke="#e2e0da" stroke-width="2"/>
    <g clip-path="url(#circleClip)">
      <g transform="translate(0,25) scale(1.15) translate(0,-65)">
        <path d="M-10,30 L-215,150 L215,150 L10,30 Z" fill="url(#downGlow)"/>
        <circle cx="0" cy="30" r="20" fill="url(#lensGlow)"/>
        <rect x="-23" y="98" width="46" height="52" fill="#0e2a47"/>
        <rect x="-27" y="146" width="54" height="7" rx="1" fill="#0e2a47"/>
        <rect x="-15" y="60" width="30" height="38" fill="#0e2a47"/>
        <rect x="-21" y="47" width="42" height="11" rx="2" fill="#0e2a47"/>
        <rect x="-15" y="15" width="30" height="32" rx="3" fill="#0e2a47"/>
        <circle cx="0" cy="30" r="12" fill="none" stroke="#b9bcbe" stroke-width="4"/>
        <circle cx="0" cy="30" r="5" fill="#e8b4a0"/>
        <ellipse cx="0" cy="13" rx="28" ry="5" fill="#0e2a47"/>
        <path d="M-28,13 Q-9,3 0,-13 Q9,3 28,13 Z" fill="#0e2a47"/>
        <circle cx="0" cy="-13" r="8" fill="url(#tipGlow)"/>
        <circle cx="0" cy="-13" r="4.5" fill="#c0392b"/>
      </g>
    </g>
  </g>

</svg>
