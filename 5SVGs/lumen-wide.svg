<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="downGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.65"/>
      <stop offset="30%" stop-color="#a24242" stop-opacity="0.38"/>
      <stop offset="60%" stop-color="#9ba0a3" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#c7cacc" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="beamSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b9bcbe" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d6d9da" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b9bcbe" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="pool" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#a24242" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#9ba0a3" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#b9bcbe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8b1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="#9ba0a3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#b9bcbe" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hatShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e2a47" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="gndFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2a47" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e2a47" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="400" fill="#f7f6f3"/>

  <!-- ICON -->
  <g transform="translate(230,185) scale(0.76) translate(0,-65)">
    <circle cx="0" cy="30" r="120" fill="url(#halo)"/>
    <path d="M-10,30 L-215,150 L215,150 L10,30 Z" fill="url(#downGlow)"/>
    <path d="M-5,30 L-115,150 L115,150 L5,30 Z" fill="url(#beamSheen)" opacity="0.5"/>
    <line x1="-4" y1="30" x2="-85" y2="150" stroke="#d6d9da" stroke-width="1.4" opacity="0.4"/>
    <line x1="0"  y1="30" x2="0"   y2="150" stroke="#e4e6e7" stroke-width="1.4" opacity="0.45"/>
    <line x1="4"  y1="30" x2="85"  y2="150" stroke="#d6d9da" stroke-width="1.4" opacity="0.4"/>
    <line x1="-10" y1="30" x2="-215" y2="150" stroke="#9ba0a3" stroke-width="1" opacity="0.35"/>
    <line x1="10"  y1="30" x2="215"  y2="150" stroke="#9ba0a3" stroke-width="1" opacity="0.35"/>
    <circle cx="0" cy="30" r="20" fill="url(#lensGlow)"/>
    <ellipse cx="0" cy="150" rx="205" ry="24" fill="url(#pool)"/>
    <line x1="-235" y1="150" x2="235" y2="150" stroke="#0e2a47" stroke-width="3.5"/>
    <rect x="-200" y="150" width="400" height="16" fill="url(#gndFade)"/>
    <rect x="-23" y="98" width="46" height="52" fill="#0e2a47"/>
    <rect x="-27" y="146" width="54" height="7" rx="1" fill="#0e2a47"/>
    <rect x="-27" y="95" width="54" height="3" rx="1" fill="#b9bcbe" opacity="0.35"/>
    <rect x="-23" y="122" width="46" height="3" rx="1" fill="#b9bcbe" opacity="0.15"/>
    <rect x="-15" y="60" width="30" height="38" fill="#0e2a47"/>
    <rect x="-19" y="58" width="38" height="3" rx="1" fill="#b9bcbe" opacity="0.35"/>
    <rect x="-21" y="47" width="42" height="11" rx="2" fill="#0e2a47"/>
    <rect x="-23" y="43" width="46" height="5" rx="1" fill="#b9bcbe" opacity="0.45"/>
    <line x1="-16" y1="47" x2="-16" y2="56" stroke="#b9bcbe" stroke-width="1.2" opacity="0.3"/>
    <line x1="-6"  y1="47" x2="-6"  y2="56" stroke="#b9bcbe" stroke-width="1.2" opacity="0.3"/>
    <line x1="4"   y1="47" x2="4"   y2="56" stroke="#b9bcbe" stroke-width="1.2" opacity="0.3"/>
    <line x1="14"  y1="47" x2="14"  y2="56" stroke="#b9bcbe" stroke-width="1.2" opacity="0.3"/>
    <rect x="-15" y="15" width="30" height="32" rx="3" fill="#0e2a47"/>
    <circle cx="0" cy="30" r="12" fill="none" stroke="#b9bcbe" stroke-width="3"/>
    <circle cx="0" cy="30" r="7" fill="none" stroke="#b9bcbe" stroke-width="1.4" opacity="0.5"/>
    <circle cx="0" cy="30" r="5" fill="#e8b4a0"/>
    <circle cx="0" cy="30" r="2.5" fill="#fff" opacity="0.95"/>
    <ellipse cx="0" cy="13" rx="28" ry="5" fill="#0e2a47"/>
    <ellipse cx="0" cy="13" rx="28" ry="5" fill="none" stroke="#b9bcbe" stroke-width="1" opacity="0.3"/>
    <path d="M-28,13 Q-9,3 0,-13 Q9,3 28,13 Z" fill="#0e2a47"/>
    <path d="M0,-13 Q9,3 28,13 L14,13 Q6,4 0,-8 Z" fill="url(#hatShade)"/>
    <circle cx="0" cy="-13" r="7" fill="url(#tipGlow)"/>
    <circle cx="0" cy="-13" r="3.5" fill="#c0392b"/>
    <circle cx="-1.2" cy="-15" r="1.2" fill="#fff" opacity="0.7"/>
  </g>

  <!-- DIVIDER -->
  <line x1="470" y1="115" x2="470" y2="255" stroke="#d5d3cc" stroke-width="2"/>

  <!--
    ASYMMETRIC (flipped): LUMEN is now the WIDE element.
    LUMEN: large, wide letter-spacing, spans from x=505 far to the right.
    SECURITY: narrower beneath, left-aligned, its right edge stops short.
  -->
  <text x="505" y="200" font-size="62" font-weight="700" letter-spacing="6" fill="#0e2a47">LUMEN</text>
  <text x="508" y="240" font-size="37" letter-spacing="9.5" fill="#3a3a38">SECURITY</text>

</svg>
