    <g transform="translate(0,25) scale(1.15) translate(0,-65)">
      <path d="M-10,30 L-215,150 L215,150 L10,30 Z" fill="url(#downGlow)"/>
      <circle cx="0" cy="30" r="20" fill="url(#lensGlow)"/>
      <rect x="-23" y="98" width="46" height="52" fill="#0e2a47"/>
      <rect x="-27" y="146" width="54" height="7" rx="1" fill="#0e2a47"/>
      <rect x="-15" y="60" width="30" height="38" fill="#0e2a47"/>
      <rect x="-21" y="47" width="42" height="11" rx="2" fill="#0e2a47"/>
      <rect x="-15" y="15" width="30" height="32" rx="3" fill="#0e2a47"/>
      <circle cx="0" cy="30" r="12" fill="none" stroke="#b9bcbe" stroke-width="4"/>
      <circle cx="0" cy="30" r="5" fill="#e8b4a0"/>
      <ellipse cx="0" cy="13" rx="28" ry="5" fill="#0e2a47"/>
      <path d="M-28,13 Q-9,3 0,-13 Q9,3 28,13 Z" fill="#0e2a47"/>
      <circle cx="0" cy="-13" r="8" fill="url(#tipGlow)"/>
      <circle cx="0" cy="-13" r="4.5" fill="#c0392b"/>
