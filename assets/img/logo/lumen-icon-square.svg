<svg xmlns="http://www.w3.org/2000/svg" viewBox="-180 -180 360 360">
  <defs>
    <linearGradient id="downGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#9ba0a3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c7cacc" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b1a1a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8b1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tipGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squareClip"><rect x="-180" y="-180" width="360" height="360" rx="40"/></clipPath>
  </defs>

  <rect x="-180" y="-180" width="360" height="360" rx="40" fill="#ffffff"/>
